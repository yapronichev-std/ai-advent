name: Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get tag info
        id: tag
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "name=${TAG_NAME}" >> $GITHUB_OUTPUT
          # Multiline output — use heredoc syntax to avoid GITHUB_OUTPUT format errors
          {
            echo "message<<EOF"
            git tag -l --format='%(contents)' "${TAG_NAME}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Read changelog
        id: changelog
        run: |
          CHANGELOG="FirstAgent/docs/CHANGELOG.md"
          if [ -f "$CHANGELOG" ]; then
            # Extract the section for this version (between ## vX.Y.Z and next ## or EOF)
            VERSION="${{ steps.tag.outputs.name }}"
            awk "/^## $VERSION /{found=1; next} /^## v/{if(found) exit} found{print}" "$CHANGELOG" > /tmp/release_notes.md
            # If extraction failed, use full changelog
            if [ ! -s /tmp/release_notes.md ]; then
              cp "$CHANGELOG" /tmp/release_notes.md
            fi
          else
            echo "No CHANGELOG.md found at $CHANGELOG — using tag annotation" > /tmp/release_notes.md
          fi
          echo "size=$(wc -c < /tmp/release_notes.md)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const tagName = process.env.GITHUB_REF.replace('refs/tags/', '');
            const rawNotes = fs.readFileSync('/tmp/release_notes.md', 'utf8');

            // Build release body: notes + link to full changelog
            let body = rawNotes.trim();
            body += `\n\n---\n📄 [Full Changelog](../../blob/main/FirstAgent/docs/CHANGELOG.md)`;
            body += `\n🤖 Generated by [AI Release Pipeline](../../blob/main/FirstAgent/release.py)`;

            const release = await github.rest.repos.createRelease({
              ...context.repo,
              tag_name: tagName,
              name: `Release ${tagName}`,
              body: body,
              draft: false,
              prerelease: false,
            });

            console.log(`Release created: ${release.data.html_url}`);

      - name: Notify Telegram (optional)
        if: env.TELEGRAM_BOT_TOKEN != ''
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          VERSION="${{ steps.tag.outputs.name }}"
          TEXT="🚀 Релиз $VERSION опубликован!

          ${{ github.server_url }}/${{ github.repository }}/releases/tag/$VERSION"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "parse_mode=HTML"
