name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff "origin/${{ github.base_ref }}...HEAD" > /tmp/pr_diff.txt
          echo "diff_size=$(wc -c < /tmp/pr_diff.txt)" >> $GITHUB_OUTPUT
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > /tmp/changed_files.txt

      - name: Call local code review API
        id: review
        run: |
          DIFF_CONTENT=$(python3 -c "
          import sys, json
          with open('/tmp/pr_diff.txt') as f:
              print(json.dumps(f.read()))
          ")

          CHANGED_FILES=$(python3 -c "
          import sys, json
          with open('/tmp/changed_files.txt') as f:
              lines = [l.strip() for l in f if l.strip()]
          print(json.dumps(lines))
          ")

          REVIEW_URL="http://localhost:8000/review/pr"

          # Escape PR title and description
          PR_TITLE=$(python3 -c "import sys,json; print(json.dumps('''${{ github.event.pull_request.title }}'''))")
          PR_BODY=$(python3 -c "import sys,json; print(json.dumps('''${{ github.event.pull_request.body }}'''))")

          curl -s -X POST "$REVIEW_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"pr_title\": $PR_TITLE,
              \"pr_description\": $PR_BODY,
              \"base_branch\": \"${{ github.base_ref }}\",
              \"head_branch\": \"${{ github.head_ref }}\",
              \"diff_text\": $DIFF_CONTENT,
              \"changed_files\": $CHANGED_FILES
            }" > /tmp/review_result.json

          echo "Review completed" >> $GITHUB_STEP_SUMMARY

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/review_result.json', 'utf8');
            const data = JSON.parse(raw);

            if (data.error) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: `## 🤖 AI Code Review — Error\n\n**Error:** ${data.error}`
              });
              return;
            }

            const r = data.result || {};
            const s = r.summary || {};

            let body = `## 🤖 AI Code Review\n\n`;
            body += `**Overall:** ${s.overall_assessment || 'N/A'}\n\n`;
            body += `**Total issues:** ${s.total_issues || 0}\n\n`;

            const categories = [
              { key: 'bugs',               label: '🐛 Bugs' },
              { key: 'architecture_issues', label: '🏗️ Architecture' },
              { key: 'security_issues',     label: '🔒 Security' },
              { key: 'performance_issues',  label: '⚡ Performance' },
              { key: 'recommendations',     label: '💡 Recommendations' },
            ];

            categories.forEach(cat => {
              const issues = r[cat.key] || [];
              if (issues.length === 0) return;
              body += `### ${cat.label} (${issues.length})\n\n`;
              issues.forEach(issue => {
                const sev = issue.severity || 'minor';
                const sevEmoji = sev === 'critical' ? '🔴' : sev === 'major' ? '🟡' : '🟢';
                const loc = issue.file_path ? `**\`${issue.file_path}\`**` : '';
                const line = issue.line_number != null ? `:${issue.line_number}` : '';
                body += `${sevEmoji} **${sev.toUpperCase()}** ${loc}${line}\n`;
                body += `> ${issue.description}\n\n`;
                if (issue.suggestion) body += `*Suggestion:* ${issue.suggestion}\n\n`;
                body += `---\n\n`;
              });
            });

            // RAG sources note
            const ragSources = data.rag_sources || r.rag_sources || [];
            if (ragSources.length > 0) {
              body += `\n<details><summary>📚 RAG Sources (${ragSources.length})</summary>\n\n`;
              ragSources.forEach(rs => {
                body += `- **${rs.source || 'unknown'}** (${rs.section || ''}) — score: ${Math.round((rs.score || 0) * 100)}%\n`;
              });
              body += `\n</details>\n`;
            }

            body += `\n---\n*Generated by AI Code Review · ${s.review_quality || 'N/A'} quality*`;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: body
            });
